appId: com.jauto.app
productName: Jauto
directories:
  buildResources: build
  output: release
files:
  - out/**/*
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  artifactName: ${productName}-${version}.${ext}
  category: public.app-category.education
