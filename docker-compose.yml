services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: jauto-web:latest
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3